name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Create release tag
        run: |
          pnpm version ${{ inputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: release v$NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "chore: release v$NEW_VERSION"
          echo "RELEASE_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=v$NEW_VERSION" >> $GITHUB_ENV

      - name: Push commit and tag
        run: |
          git push
          git push origin "${{ env.RELEASE_TAG }}"

      - name: Create GitHub Release
        run: |
          gh release create "${{ env.RELEASE_TAG }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Bump to dev version
        run: |
          pnpm version prerelease --preid=dev --no-git-tag-version
          git add package.json
          git commit -m "chore: bump version for next development cycle"
          git push
